<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
html {
    background-color: aliceblue;
}

/* 뒤로가기 밑줄 제거 */
.home > a{
    text-decoration: none;
    font-weight: bold;
}

.title {
    font-size: 20px;
    margin-left: 20px;
}

.main-logo > img {
    width: 200px;
    width: 200px;
    margin-left: 20px;
}

.Others > ul > li {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 10px;
}

.category {
    margin-left: 20px;
}


/* 질문 */
.Others-title {
    list-style-type: disc;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 5px;
}

/* 질문 설명 */
.Others-desc {
    list-style-type: decimal ;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 5px;
}

/* 버튼 꾸미기 */
.images-open {
    position: relative;
    border: none;
    min-width: 250px;
    min-height: 50px;
    background: linear-gradient(
        90deg,
        rgb(13, 120, 214) 0%,
        rgb(47, 193, 134) 100%
    );
    border-radius: 1000px;
    color: darkslategray;
    cursor: pointer;
    box-shadow: 12px 12px 24px rgba(79, 209, 197, 0.64);
    font-weight: 700;
    transition: 0.3s;
    margin-top: 20px;
    margin-left: 60px;
}

.images-open:hover {
    transform: scale(1.2);
}

.images-open:hover::after {
    content: "";
    width: 30px;
    height: 30px;
    border-radius: 100%;
    border: 6px solid #00ffcb;
    position: absolute;
    z-index: -1;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: ring 1.5s infinite;
}

/* 버튼 링 표시 */
@keyframes gradient1 {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}

@keyframes gradient2 {
    0% {
        background-position: 100% 50%;
    }
    50% {
        background-position: 0% 50%;
    }
    100% {
        background-position: 100% 50%;
    }
}

@keyframes ring {
    0% {
        width: 30px;
        height: 30px;
        opacity: 1;
    }
    100% {
        width: 300px;
        height: 300px;
        opacity: 0;
    }
}


.reference-image {
            display: none; /* 이미지를 기본적으로 숨깁니다. */
            width: 350px;
            height: 350px;
            margin-top: 50px;
            margin-left: 60px;
    }

    </style>
</head>
<body>
    <div class="home">
        <a href="../index.html">뒤로가기</a>
    </div>

    <!-- 리밴스드 로고 설정 -->
    <figure class="main-logo">
        <img src="../images/revanced-main-logo.svg" alt="">
    </figure>

    <h3 class="title">리밴스드 익스텐디드 기타 설정</h3>

    <!-- 표시선 그리기 -->
    <hr>
    <hr>
    <div class="Others">
        <h2 class="category">목차▼</h2>
        <ul>
            <li>플레이어 매개변수가 없어요.</li>
            <li>영상 플레이어 하단이나 전체화면으로 할시 래터박스를 검정색으로 되돌리고 싶어요.</li>
        </ul>
    </div>
    <!-- 표시선 그리기 -->
    <hr>
    <hr>
    
    <!-- 구분 -->

    <!-- 여기서 질문 설명 -->
    <div class="Others-main">
        <ol>
            <li class="Others-title">플레이어 매개변수가 없어요.
                <ul>
                    <li class="Others-desc">Revanced Extended > 플레이어 > 액션 버튼</li>
                </ul>
            </li>
        </ol>
    </div>

    <div class="Reference-image">
        <img class="reference-image" src="../bird-8763079_1280.jpg" alt="" style="display: none;">
        <button class="images-open" onclick="toggleImage(this)">
            사진 표시
        </button>
    </div>

    <!-- 표시선 그리기 -->
    <hr>
    <hr>

    <!-- 여기서 질문 설명 -->
    <div class="Others-main">
        <ol>
            <li class="Others-title">영상 플레이어 하단이나 전체화면으로 할시 래터박스를 검정색으로 되돌리고 싶어요.
                <ul>
                    <li class="Others-desc">Revanced Extended > 플레이어 > 앰비언트 모드</li>
                </ul>
            </li>
        </ol>
    </div>

    <div class="Reference-image">
        <img class="reference-image" src="../bird-8763079_1280.jpg" alt="" style="display: none;">
        <button class="images-open" onclick="toggleImage(this)">
            사진 표시
        </button>
    </div>


<script>
    function toggleImage(button) {
        var parentDiv = button.parentElement;
        var image = parentDiv.querySelector(".reference-image");
        if (image.style.display === "none" || image.style.display === "") {
            image.style.display = "block"; // 이미지를 보이게 합니다.
            button.textContent = "사진 숨기기"; // 버튼 텍스트를 변경합니다.
        } else {
            image.style.display = "none"; // 이미지를 숨깁니다.
            button.textContent = "사진 표시"; // 버튼 텍스트를 변경합니다.
        }
    }
</script>


</body>
</html>
