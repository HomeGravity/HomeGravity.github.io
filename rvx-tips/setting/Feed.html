<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        html {
            background-color: aliceblue;
        }

        /* 홈 밑줄 제거 */
        .home > a{
            text-decoration: none;
            font-weight: bold;
            color: slateblue
            
        }

        .title {
            font-size: 20px;
            margin-left: 20px;
        }

        .main-logo > img {
            width: 200px;
            width: 200px;
            margin-left: 20px;
        }

        .Feed > ul > li {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* 텍스트 밑줄 제거 */
        .Feed > ul > li > a {
            text-decoration: none;
            color: slateblue
            
        }

        .category {
            margin-left: 20px;
        }


        /* 질문 */
        .Feed-title {
            list-style-type: disc;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            color: slateblue
            
        }

        /* 질문 설명 */
        .Feed-desc {
            list-style-type: decimal ;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* 버튼 꾸미기 */
        .images-open {
            position: relative;
            border: none;
            min-width: 250px;
            min-height: 50px;
            background: linear-gradient(
                90deg,
                rgb(13, 120, 214) 0%,
                rgb(47, 193, 134) 100%
            );
            border-radius: 1000px;
            color: darkslategray;
            cursor: pointer;
            box-shadow: 12px 12px 24px rgba(79, 209, 197, 0.64);
            font-weight: 700;
            transition: 0.3s;
            margin-top: 20px;
            margin-left: 60px;
        }

        .images-open:hover {
            transform: scale(1.2);
        }

        .images-open:hover::after {
            content: "";
            width: 30px;
            height: 30px;
            border-radius: 100%;
            border: 6px solid #5d12de;
            position: absolute;
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: ring 1.5s infinite;
        }

        /* 버튼 링 표시 */
        @keyframes gradient1 {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gradient2 {
            0% {
                background-position: 100% 50%;
            }
            50% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 100% 50%;
            }
        }

        @keyframes ring {
            0% {
                width: 30px;
                height: 30px;
                opacity: 1;
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
            }
        }


        .reference-image {
            display: none; /* 기본적으로 이미지를 숨깁니다 */
            opacity: 0; /* 투명도를 0으로 설정하여 보이지 않게 합니다 */
            width: 250px;
            /* height: 600px; */
            margin-top: 50px;
            margin-left: 60px;
            transition: opacity 1.2s ease; /* 부드러운 전환 효과를 설정합니다 */
            border-radius: 15px;
            
        }
        .reference-image.show {
            display: block; /* 이미지를 보이게 합니다 */
            opacity: 1; /* 투명도를 1로 설정하여 이미지를 보이게 합니다 */
        }

    </style>
</head>
<body>
    <div class="home">
        <a href="../index.html">홈</a>
    </div>

    <!-- 리밴스드 로고 설정 -->
    <figure class="main-logo">
        <img src="../images/main-images/revanced-main-logo.svg" alt="">
    </figure>

    <h3 class="title">리밴스드 익스텐디드 Feed 설정</h3>

    <!-- 표시선 그리기 -->
    <br>
    <hr>
    <hr>
    <br>

    <div class="Feed">
        <h2 class="category">목차▼</h2>
        <ul>
            <li><a href="#main-1">추가 예정</a></li>
            <li><a href="#main-2">추가 예정</a></li>
        </ul>
    </div>
    <!-- 표시선 그리기 -->
    <br>
    <hr>
    <hr>
    <br>
    

    <div class="content">
        <!-- 구분 -->

        <!-- 여기서 질문 설명 -->
        <div class="Feed-main" id="main-1">
            <ol>
                <li class="Feed-title">추가 예정
                    <ul>
                        <br>
                        <li class="Feed-desc">추가 예정</li>
                    </ul>
                </li>
            </ol>
        </div>

        <div class="Reference">
            <img class="reference-image" src="../bird-8763079_1280.jpg" alt="" style="display: none;">
            <button class="images-open" onclick="toggleImages(this)">
                Show Images
            </button>
        </div>

        <!-- 표시선 그리기 -->
        <br>
        <hr>
        <hr>
        <br>

        <!-- 여기서 질문 설명 -->
        <div class="Feed-main" id="main-2">
            <ol>
                <li class="Feed-title">추가 예정
                    <ul>
                        <br>
                        <li class="Feed-desc">추가 예정</li>
                    </ul>
                </li>
            </ol>
        </div>

        <div class="Reference">
            <img class="reference-image" src="../bird-8763079_1280.jpg" alt="" style="display: none;">
            <button class="images-open" onclick="toggleImages(this)">
                Show Images
            </button>
        </div>
    </div>


<script>
        function toggleImages(button) {
            var parentDiv = button.parentElement;
            var images = parentDiv.querySelectorAll(".reference-image");

            images.forEach(function(image) {
                if (image.classList.contains("show")) {
                    image.classList.remove("show");
                    setTimeout(function() {
                        image.style.display = "none"; // 전환 효과 후 이미지를 숨깁니다
                    }, 500); // 여기서 전환 시간(0.5초)을 맞춥니다
                    button.textContent = "Show Images";
                } else {
                    image.style.display = "block";
                    setTimeout(function() {
                        image.classList.add("show");
                    }, 10); // 약간의 지연 시간 후에 클래스를 추가하여 전환 효과를 적용합니다
                    button.textContent = "Hide Images";
                }
            });
        }
</script>


</body>
</html>
