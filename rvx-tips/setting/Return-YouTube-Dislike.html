<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
html {
    background-color: aliceblue;
}

/* 뒤로가기 밑줄 제거 */
.home > a{
    text-decoration: none;
    font-weight: bold;
}

.title {
    font-size: 20px;
    margin-left: 20px;
}

.main-logo > img {
    width: 200px;
    width: 200px;
    margin-left: 20px;
}

.Return-YouTube-Dislike > ul > li {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
}

/* 텍스트 밑줄 제거 */
.Return-YouTube-Dislike > ul > li > a {
    text-decoration: none;
}

.category {
    margin-left: 20px;
}


/* 질문 */
.Return-YouTube-Dislike-title {
    list-style-type: disc;
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 5px;
}

/* 질문 설명 */
.Return-YouTube-Dislike-desc {
    list-style-type: decimal ;
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 5px;
}

/* 버튼 꾸미기 */
.images-open {
    position: relative;
    border: none;
    min-width: 250px;
    min-height: 50px;
    background: linear-gradient(
        90deg,
        rgb(13, 120, 214) 0%,
        rgb(47, 193, 134) 100%
    );
    border-radius: 1000px;
    color: darkslategray;
    cursor: pointer;
    box-shadow: 12px 12px 24px rgba(79, 209, 197, 0.64);
    font-weight: 700;
    transition: 0.3s;
    margin-top: 20px;
    margin-left: 60px;
}

.images-open:hover {
    transform: scale(1.2);
}

.images-open:hover::after {
    content: "";
    width: 30px;
    height: 30px;
    border-radius: 100%;
    border: 6px solid #00ffcb;
    position: absolute;
    z-index: -1;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: ring 1.5s infinite;
}

/* 버튼 링 표시 */
@keyframes gradient1 {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}

@keyframes gradient2 {
    0% {
        background-position: 100% 50%;
    }
    50% {
        background-position: 0% 50%;
    }
    100% {
        background-position: 100% 50%;
    }
}

@keyframes ring {
    0% {
        width: 30px;
        height: 30px;
        opacity: 1;
    }
    100% {
        width: 300px;
        height: 300px;
        opacity: 0;
    }
}


.reference-image {
    display: none; /* 기본적으로 이미지를 숨깁니다 */
    opacity: 0; /* 투명도를 0으로 설정하여 보이지 않게 합니다 */
    width: 250px;
    /* height: 600px; */
    margin-top: 50px;
    margin-left: 60px;
    transition: opacity 0.5s ease; /* 부드러운 전환 효과를 설정합니다 */
}
.reference-image.show {
    display: block; /* 이미지를 보이게 합니다 */
    opacity: 1; /* 투명도를 1로 설정하여 이미지를 보이게 합니다 */
}

    </style>
</head>
<body>
    <div class="home">
        <a href="../index.html">뒤로가기</a>
    </div>

    <!-- 리밴스드 로고 설정 -->
    <figure class="main-logo">
        <img src="../images/revanced-main-logo.svg" alt="">
    </figure>

    <h3 class="title">리밴스드 익스텐디드 Return YouTube Dislike 설정</h3>

    <!-- 표시선 그리기 -->
    <br>
    <hr>
    <hr>
    <br>

    <div class="Return-YouTube-Dislike">
        <h2 class="category">목차▼</h2>
        <ul>
            <li><a href="#main-1">"Return YouTube Dislike을 일시적으로 사용할 수 없습니다" 메시지가 계속 떠요.</a></li>
        </ul>
    </div>
    <!-- 표시선 그리기 -->
    <br>
    <hr>
    <hr>
    <br>
    
    <!-- 구분 -->

    <!-- 여기서 질문 설명 -->
    <div class="Return-YouTube-Dislike-main" id="main-1">
        <ol>
            <li class="Return-YouTube-Dislike-title">"Return YouTube Dislike을 일시적으로 사용할 수 없습니다" 메시지가 계속 떠요.
                <ul>
                    <br>
                    <li class="Return-YouTube-Dislike-desc">"Revanced Extended > Return YouTube Dislike > <br> API를 사용할 수 없을 때 팝업 메시지 표시하기 > 비활성화</li>
                </ul>
            </li>
        </ol>
    </div>

    <div class="Reference">
        <img class="reference-image" src="../bird-8763079_1280.jpg" alt="">
        <button class="images-open" onclick="toggleImages(this)">
            Show Images
        </button>
    </div>


<script>
        function toggleImages(button) {
            var parentDiv = button.parentElement;
            var images = parentDiv.querySelectorAll(".reference-image");

            images.forEach(function(image) {
                if (image.classList.contains("show")) {
                    image.classList.remove("show");
                    setTimeout(function() {
                        image.style.display = "none"; // 전환 효과 후 이미지를 숨깁니다
                    }, 500); // 여기서 전환 시간(0.5초)을 맞춥니다
                    button.textContent = "Show Images";
                } else {
                    image.style.display = "block";
                    setTimeout(function() {
                        image.classList.add("show");
                    }, 10); // 약간의 지연 시간 후에 클래스를 추가하여 전환 효과를 적용합니다
                    button.textContent = "Hide Images";
                }
            });
        }
</script>


</body>
</html>
