<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorts 설정</title>

    <style>
        html {
            background-color: aliceblue;
            
            /* 부드러운 스크롤을 위한 CSS */
            scroll-behavior: smooth;
            /* overflow: hidden; */
            word-wrap: break-word; 
            white-space: normal;
        }

        /* 홈 밑줄 제거 */
        .home > a{
            text-decoration: none;
            font-weight: bold;
            color: slateblue
            
        }

        .title {
            font-size: 20px;
            margin-left: 20px;
        }

        .main-logo > img {
            width: 200px;
            width: 200px;
            margin-left: 20px;
        }


        /* 여기에도 컬러 적용 */
        .Shorts > ul > li {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            color: slateblue 

        }

        /* 텍스트 밑줄 제거 */
        .Shorts > ul > li > a {
            text-decoration: none;
            color: slateblue
            
        }


        .category {
            margin-left: 20px;
            
        }


        /* 질문 */
        .Shorts-title {
            list-style-type: disc;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            color: slateblue
            
        }

        /* 질문 설명 */
        .Shorts-desc {
            list-style-type: decimal ;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            color: darkolivegreen;
            
        }

        /* 버튼 꾸미기 */
        .images-open {
            position: relative;
            border: none;
            min-width: 250px;
            min-height: 50px;
            background: linear-gradient(
                90deg,
                rgb(13, 120, 214) 0%,
                rgb(47, 193, 134) 100%
            );
            border-radius: 1000px;
            color: darkslategray;
            cursor: pointer;
            box-shadow: 12px 12px 24px rgba(79, 209, 197, 0.64);
            font-weight: 700;
            transition: 0.3s;
            margin-top: 20px;
            margin-left: 60px;
        }

        .images-open:hover {
            transform: scale(1.2);
        }

        .images-open:hover::after {
            content: "";
            width: 30px;
            height: 30px;
            border-radius: 100%;
            border: 6px solid #5d12de;
            position: absolute;
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: ring 1.5s infinite;
        }

        /* 버튼 링 표시 */
        @keyframes gradient1 {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gradient2 {
            0% {
                background-position: 100% 50%;
            }
            50% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 100% 50%;
            }
        }

        @keyframes ring {
            0% {
                width: 30px;
                height: 30px;
                opacity: 1;
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
            }
        }


        .reference-image {
            display: none; /* 기본적으로 이미지를 숨깁니다 */
            opacity: 0; /* 투명도를 0으로 설정하여 보이지 않게 합니다 */
            width: 250px;
            /* height: 600px; */
            margin-top: 50px;
            margin-left: 60px;
            transition: opacity 1.2s ease; /* 부드러운 전환 효과를 설정합니다 */
            border-radius: 15px;
            
        }
        .reference-image.show {
            display: block; /* 이미지를 보이게 합니다 */
            opacity: 1; /* 투명도를 1로 설정하여 이미지를 보이게 합니다 */
        }

        /* 어드레스 적용 */
        .contact {
            margin-left: 20px;
            font-weight: bold;
        }

        /* 어드레스 링크 컬러 적용 */
        .contact  a {
            color: brown;
            text-decoration: none;
        }

    </style>
</head>
<body>
    <div class="home">
        <a href="../index.html">홈</a>
    </div>

    <!-- 리밴스드 로고 설정 -->
    <figure class="main-logo">
        <img src="../images/main-images/revancify_blue-main-logo.png" alt="">

    <hr>
    <hr>

    <div class="content">

                    <ul>

            </address>
        </div>

    </div>

    <script>
        function toggleImage(button) {
            var parentDiv = button.parentElement;
            var image = parentDiv.querySelector(".reference-image");

            if (image.classList.contains("show")) {
                image.classList.remove("show");
                setTimeout(function() {
                    image.style.display = "none"; // 전환 효과 후 이미지를 숨깁니다
                }, 500); // 여기서 전환 시간(0.5초)을 맞춥니다
                button.textContent = "Show Image";
            } else {
                image.style.display = "block";
                setTimeout(function() {
                    image.classList.add("show");
                }, 10); // 약간의 지연 시간 후에 클래스를 추가하여 전환 효과를 적용합니다
                button.textContent = "Hide Image";
            }
        }
    </script>

    <!-- 해당 스크립트는 다른 파일에도 적용-->
    <script>
        function scrollToHash() {
            var hash = window.location.hash;
            
            if (hash !== '') {
                var target = document.querySelector(hash);
                
                if (target) {
                    target.scrollIntoView({behavior: "smooth"});
                }
            }
        }
        
        // 해시 변경 이벤트 감지
        window.addEventListener('hashchange', scrollToHash);
        
        // 페이지 로드 시 해시가 있으면 해당 위치로 스크롤
        document.addEventListener('DOMContentLoaded', function() {
            // DOMContentLoaded 이후 약간의 지연을 주어 스크롤
            setTimeout(scrollToHash, 1000);
        });
    </script>

</body>
</html>
